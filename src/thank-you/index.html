<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¡Gracias! | IterLens</title>
    <link rel="icon" href="../assets/logo.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Design tokens ── */
      :root {
        --bg: #050a0f;
        --bg2: #0a0f1a;
        --bg3: #0f172a;
        --border: #334155;
        --border-light: rgba(100, 116, 139, 0.2);
        --accent: #06b6d4;
        --accent2: #0284c7;
        --accent-glow: rgba(6, 182, 212, 0.2);
        --accent-dim: rgba(6, 182, 212, 0.35);
        --teal: #14b8a6;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --muted-light: #cbd5e1;
        --card: #0f172a;
        --error: #f87171;
        --success: #06b6d4;
        --radius-lg: 28px;
        --radius-md: 18px;
        --shadow-deep: 0 40px 120px rgba(0, 0, 0, 0.35);
        --positive: #22c55e;
        --card-hover: rgba(30, 41, 59, 0.92);
      }

      /* ── Reset ── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        overflow-x: hidden;
      }

      /* ── Noise overlay ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9000;
        opacity: 0.4;
      }

      /* ── Navigation ── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 20px 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(20px);
        background: rgba(10, 10, 10, 0.8);
      }

      .logo {
        font-family: "DM Sans", sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }

      .logo img {
        height: 40px;
      }

      .nav-links {
        display: flex;
        gap: 36px;
        align-items: center;
      }

      .nav-links a {
        font-size: 13px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: var(--text);
      }

      /* ── Main container ── */
      main {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 120px 20px 60px;
        position: relative;
        overflow: hidden;
      }

      /* ── Background glows ── */
      .bg-glow {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }

      .glow-1 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
        top: -200px;
        right: -200px;
        opacity: 0.3;
      }

      .glow-2 {
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(2, 132, 199, 0.1) 0%, transparent 70%);
        bottom: -150px;
        left: -150px;
        opacity: 0.4;
      }

      /* ── Thank you card ── */
      .thank-you-container {
        position: relative;
        z-index: 10;
        max-width: 600px;
        width: 100%;
      }

      .thank-you-card {
        background: linear-gradient(
          135deg,
          rgba(15, 23, 42, 0.8) 0%,
          rgba(15, 23, 42, 0.6) 100%
        );
        border: 1px solid var(--border-light);
        border-radius: var(--radius-lg);
        padding: 60px 40px;
        text-align: center;
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        animation: slideUp 0.8s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Checkmark icon ── */
      .checkmark {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 30px;
        box-shadow: 0 0 30px var(--accent-glow);
        animation: scaleIn 0.6s ease-out;
      }

      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.5);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .checkmark svg {
        width: 44px;
        height: 44px;
        stroke: white;
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        animation: checkstroke 0.6s ease-out 0.3s both;
      }

      @keyframes checkstroke {
        from {
          stroke-dasharray: 60;
          stroke-dashoffset: 60;
        }
        to {
          stroke-dasharray: 60;
          stroke-dashoffset: 0;
        }
      }

      /* ── Title ── */
      .thank-you-card h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 48px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--text);
        margin-bottom: 16px;
        line-height: 1.2;
      }

      .thank-you-card h1 em {
        color: var(--accent);
        font-style: normal;
        font-weight: 700;
      }

      /* ── Subtitle ── */
      .thank-you-card p {
        font-size: 16px;
        line-height: 1.6;
        color: var(--muted-light);
        margin-bottom: 20px;
      }

      .thank-you-card .subtitle {
        font-size: 15px;
        color: var(--muted);
        margin-bottom: 40px;
      }

      /* ── CTA Buttons ── */
      .cta-group {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        padding: 14px 32px;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: "DM Sans", sans-serif;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
        color: #000;
        font-weight: 700;
        box-shadow: 0 8px 24px rgba(6, 182, 212, 0.3);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(6, 182, 212, 0.4);
      }

      .btn-secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
      }

      .btn-secondary:hover {
        background: rgba(6, 182, 212, 0.1);
        box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        nav {
          padding: 16px 30px;
        }

        .nav-links {
          gap: 20px;
        }

        .nav-links a {
          font-size: 12px;
        }

        .thank-you-card {
          padding: 40px 30px;
        }

        .thank-you-card h1 {
          font-size: 36px;
        }

        .cta-group {
          flex-direction: column;
        }

        .btn {
          width: 100%;
          justify-content: center;
        }

        .glow-1 {
          width: 250px;
          height: 250px;
        }

        .glow-2 {
          width: 200px;
          height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAV -->
    <nav>
      <a href="../empresas/index.html" class="logo">
        <img src="../assets/banner.png" alt="Logo IterLens" />
      </a>
      <div class="nav-links">
        <a href="../empresas/index.html">Volver al inicio</a>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main>
      <!-- Background glows -->
      <div class="bg-glow glow-1"></div>
      <div class="bg-glow glow-2"></div>

      <!-- Thank you container -->
      <div class="thank-you-container">
        <div class="thank-you-card">
          <!-- Checkmark icon -->
          <div class="checkmark">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>

          <!-- Title -->
          <h1>¡<em>Gracias</em>!</h1>

          <!-- Message -->
          <p>
            Hemos recibido tu mensaje correctamente. Nuestro equipo lo revisará
            con atención.
          </p>

          <p class="subtitle">
            Dentro de poco nos pondremos en contacto para responder tu solicitud
            y ayudarte a optimizar tu planta.
          </p>

          <!-- CTA Buttons -->
          <div class="cta-group">
            <a href="../empresas/index.html" class="btn btn-primary">Volver al inicio</a>
            <a href="../empresas/index.html#contacto" class="btn btn-secondary"
              >Contactarnos de nuevo</a
            >
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
